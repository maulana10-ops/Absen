<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Presensi Auto-Save</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #000000;
            --text-muted: #475569;
            --border-color: #cbd5e1;
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .app-header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 24px 28px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .app-header h1 { margin: 0; font-size: 1.35rem; font-weight: 700; }
        .app-header p { margin: 4px 0 0 0; font-size: 0.85rem; color: #94a3b8; }
        
        .btn-add-day {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            transition: 0.2s;
        }

        .btn-add-day:hover { transform: translateY(-1px); }

        .table-card {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 2px solid var(--border-color);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background-color: #f1f5f9;
            color: #000000;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            padding: 16px;
            border: 1px solid var(--border-color);
        }

        th:first-child { text-align: left; }

        td { padding: 12px 16px; border: 1px solid var(--border-color); text-align: center; }

        .day-combine-cell { display: flex; align-items: center; gap: 12px; text-align: left; }
        .day-name { font-weight: 700; color: #000000; }
        .date-badge { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }

        .status-checkbox {
            appearance: none; width: 22px; height: 22px; border: 2px solid var(--border-color);
            border-radius: 6px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; background: #fff;
        }
        .status-checkbox:checked { background: #10b981; border-color: #10b981; }
        .status-checkbox:checked::before { content: "✓"; color: white; font-weight: 900; }

        .input-time, .select-overtime {
            border: 1.5px solid var(--border-color); border-radius: 8px; padding: 8px;
            font-family: inherit; font-size: 0.95rem; color: #000000;
            width: 100%; box-sizing: border-box; text-align: center; font-weight: 500;
        }

        .has-overtime { background-color: #fff7ed !important; color: #ea580c !important; border-color: #f97316 !important; font-weight: 700; }

        .mobile-label { display: none; }

        @media (max-width: 650px) {
            thead { display: none; }
            tr { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 8px solid #cbd5e1; }
            td { display: flex; flex-direction: column; align-items: flex-start; padding: 15px !important; border: 0.5px solid var(--border-color) !important; background: #fff; }
            .td-day-block { grid-column: span 2; background: #f8fafc; }
            .td-overtime-block { grid-column: span 2; }
            .mobile-label { display: block; font-size: 0.75rem; color: #000000; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <div>
            <h1>DATA KEHADIRAN KERJA</h1>
            <p>Data tersimpan otomatis, mulai dari 26 Mei 2026</p>
        </div>
        <button class="btn-add-day" onclick="tambahHariBaru()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Tambah Hari
        </button>
    </div>
    
    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th style="text-align: left;">Hari / Tanggal</th>
                    <th>Jam Masuk</th>
                    <th>Jam Keluar</th>
                    <th>Keterangan Lembur</th>
                </tr>
            </thead>
            <tbody id="attendance-rows">
                </tbody>
        </table>
    </div>
    <button onclick="hapusSemuaData()" style="margin-top: 20px; color: #ef4444; background: none; border: none; cursor: pointer; font-size: 0.8rem; text-decoration: underline;">Hapus Semua Data & Reset</button>
</div>

<script>
    const namaHariList = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"];
    
    // Inisialisasi awal saat pertama kali dibuka kosong (26 Mei 2026)
    const TANGGAL_AWAL_DEFAULT = new Date(2026, 4, 26); // Bulan Mei di JS adalah index 4

    window.onload = function() {
        loadData();
    };

    function tambahHariBaru() {
        const tbody = document.getElementById('attendance-rows');
        let tanggalTarget = new Date(TANGGAL_AWAL_DEFAULT);

        if (tbody.rows.length > 0) {
            // Jika sudah ada baris, ambil tanggal baris terakhir dan tambahkan 1 hari
            const lastDateString = tbody.lastElementChild.querySelector('.date-badge').innerText;
            const parts = lastDateString.split('/');
            tanggalTarget = new Date(parts[2], parts[1] - 1, parts[0]);
            tanggalTarget.setDate(tanggalTarget.getDate() + 1);
        }

        const dataBaru = {
            hari: namaHariList[tanggalTarget.getDay()],
            tanggal: formatDate(tanggalTarget),
            status: true,
            masuk: "09:00",
            keluar: "17:00",
            lembur: ""
        };

        buatBarisTabel(dataBaru);
        saveData();
    }

    function buatBarisTabel(data) {
        const tbody = document.getElementById('attendance-rows');
        const row = tbody.insertRow(-1);

        row.innerHTML = `
            <td class="td-day-block">
                <div class="day-combine-cell">
                    <input type="checkbox" class="status-checkbox" ${data.status ? 'checked' : ''} onchange="saveData()">
                    <div class="day-info">
                        <span class="day-name">${data.hari}</span>
                        <span class="date-badge">${data.tanggal}</span>
                    </div>
                </div>
            </td>
            <td>
                <span class="mobile-label">Jam Masuk</span>
                <input type="time" class="input-time" value="${data.masuk}" onchange="saveData()">
            </td>
            <td>
                <span class="mobile-label">Jam Keluar</span>
                <input type="time" class="input-time" value="${data.keluar}" onchange="saveData()">
            </td>
            <td class="td-overtime-block">
                <span class="mobile-label">Keterangan Lembur</span>
                <select class="select-overtime ${data.lembur ? 'has-overtime' : ''}" onchange="styleSelect(this); saveData()">
                    <option value="" ${data.lembur === "" ? 'selected' : ''}>-</option>
                    <option value="1" ${data.lembur === "1" ? 'selected' : ''}>Lembur 1 jam</option>
                    <option value="2" ${data.lembur === "2" ? 'selected' : ''}>Lembur 2 jam</option>
                    <option value="3" ${data.lembur === "3" ? 'selected' : ''}>Lembur 3 jam</option>
                </select>
            </td>
        `;
    }

    function saveData() {
        const rows = document.querySelectorAll('#attendance-rows tr');
        const allData = [];

        rows.forEach(row => {
            allData.push({
                hari: row.querySelector('.day-name').innerText,
                tanggal: row.querySelector('.date-badge').innerText,
                status: row.querySelector('.status-checkbox').checked,
                masuk: row.querySelectorAll('.input-time')[0].value,
                keluar: row.querySelectorAll('.input-time')[1].value,
                lembur: row.querySelector('.select-overtime').value
            });
        });

        localStorage.setItem('attendance_storage_v2', JSON.stringify(allData));
    }

    function loadData() {
        const storage = localStorage.getItem('attendance_storage_v2');
        if (storage) {
            const allData = JSON.parse(storage);
            allData.forEach(data => buatBarisTabel(data));
        } else {
            // Jika memori kosong, langsung buat baris pertama default: SELASA 26/05/2026
            buatBarisTabel({
                hari: namaHariList[TANGGAL_AWAL_DEFAULT.getDay()],
                tanggal: formatDate(TANGGAL_AWAL_DEFAULT),
                status: true,
                masuk: "09:00",
                keluar: "17:00",
                lembur: ""
            });
            saveData();
        }
    }

    function formatDate(date) {
        let dd = String(date.getDate()).padStart(2, '0');
        let mm = String(date.getMonth() + 1).padStart(2, '0');
        let yyyy = date.getFullYear();
        return `${dd}/${mm}/${yyyy}`;
    }

    function styleSelect(select) {
        if (select.value !== "") select.classList.add('has-overtime');
        else select.classList.remove('has-overtime');
    }

    function hapusSemuaData() {
        if (confirm("Hapus semua catatan? Data tidak bisa dikembalikan.")) {
            localStorage.removeItem('attendance_storage_v2');
            location.reload();
        }
    }
</script>

</body>
</html>
